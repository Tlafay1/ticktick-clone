# Release : sur tag v*, builde l'installeur Windows (electron-builder → publie
# exe + latest.yml pour electron-updater) et l'APK Android (signé si la
# keystore est fournie en secrets, debug sinon), attachés à la GitHub Release.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Créer la release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || true

  desktop-windows:
    needs: create-release
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build + publier l'installeur Windows
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          # Version de l'app = tag (electron-updater compare ce champ)
          npm version --no-git-tag-version "${GITHUB_REF_NAME#v}"
          npx electron-builder --win --publish always

  android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor
        working-directory: mobile
        run: |
          npm ci
          npx cap sync android

      - name: Versionner l'APK depuis le tag
        working-directory: mobile/android
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/versionCode 1/versionCode ${GITHUB_RUN_NUMBER}/" app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${VERSION}\"/" app/build.gradle

      - name: Build APK
        working-directory: mobile/android
        env:
          # Keystore optionnelle : sans elle, on livre un APK signé debug
          # (installable, mais changer de mode de signature ensuite forcera
          # une désinstallation). Secrets attendus :
          #   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
          #   ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.jks
            ./gradlew assembleRelease --no-daemon
            BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
            "$BUILD_TOOLS/zipalign" -f 4 \
              app/build/outputs/apk/release/app-release-unsigned.apk aligned.apk
            "$BUILD_TOOLS/apksigner" sign \
              --ks release.jks --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" --key-pass "pass:$KEY_PASSWORD" \
              --out "ticktick-clone-$GITHUB_REF_NAME.apk" aligned.apk
          else
            echo "::warning::Pas de keystore (ANDROID_KEYSTORE_BASE64) : APK signé debug."
            ./gradlew assembleDebug --no-daemon
            cp app/build/outputs/apk/debug/app-debug.apk "ticktick-clone-$GITHUB_REF_NAME-debug.apk"
          fi

      - name: Attacher l'APK à la release
        working-directory: mobile/android
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" ticktick-clone-*.apk --clobber
