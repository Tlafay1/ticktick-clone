# Sert le SPA Vue et relaie l'API/médias/websockets vers le backend (même origine,
# pour que les chemins relatifs /api du front fonctionnent en prod).
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25M;

    # API REST + schéma + docs.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fichiers Django (admin, Swagger) et médias uploadés.
    location /static/ { proxy_pass http://backend; }
    location /media/  { proxy_pass http://backend; }
    location /admin/  {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Websocket de synchro temps réel.
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA : toutes les autres routes renvoient index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
